name: Auto-approve and merge Dependabot PRs

# When Dependabot opens a PR, fetch its metadata, approve it, and enable auto-merge so it lands as
# soon as CI (.github/workflows/ci.yml) is green and branch protection is satisfied. `--auto` does
# not merge immediately: GitHub waits for the required status checks, so "auto-merge on success"
# means "merge once the CI gate passes."
#
# Requires two repository settings to be enabled (they cannot be set from a workflow):
#   1. Settings → General → Pull Requests → "Allow auto-merge"
#   2. Settings → Actions → General → Workflow permissions →
#        "Allow GitHub Actions to create and approve pull requests"
# And, to give `--auto` something to wait on:
#   3. Settings → Branches → protect `main` with this repo's `build` job as a required status check.
# Without (1)/(2) the approve/auto-merge calls fail; without (3) a green PR merges as soon as it is
# approved rather than waiting for CI.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Auto-merge only low-risk bumps: patch and minor version updates. Major version bumps — and
      # ANY github-actions update (a privileged, secret-adjacent supply-chain surface; these actions
      # run with `contents: write` and would sit next to publish/signing creds once a release
      # workflow lands) — require a human, because a green CI run executes the dependency's build-time
      # code but does not establish that a newly published release is trustworthy. For a grouped PR,
      # `update-type` reflects the highest bump in the group, so a group containing a major is held.
      #
      # `--auto` still waits for the required CI checks, so an eligible PR lands only once the build
      # is green and branch protection is satisfied.
      - name: Enable auto-merge
        if: |
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor') &&
          steps.metadata.outputs.package-ecosystem != 'github-actions'
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        if: |
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor') &&
          steps.metadata.outputs.package-ecosystem != 'github-actions'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
