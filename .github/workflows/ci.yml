name: CI

# The gating build for every PR and every push to main. This is the status check that Dependabot
# auto-merge (.github/workflows/auto-dependabot.yml) waits on: a Dependabot PR lands only once this
# workflow is green. After the first push, add this workflow's `build` job as a REQUIRED status
# check in Settings → Branches → branch protection for `main`, so `--auto` merges have something to
# wait for.

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Verify gradle-wrapper.jar matches a known-good Gradle release checksum before it is
      # executed — guards against a tampered wrapper jar (a classic build-time backdoor).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build and test
        run: ./gradlew clean build test --stacktrace

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jacoco-reports
          path: '**/build/reports/jacoco/**'
          if-no-files-found: ignore
